<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مار بولس | مدارس الأحد - نظام متكامل</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        * { font-family: 'Tajawal', sans-serif; }
        .gradient-bg { background: linear-gradient(145deg, #f8f4ff 0%, #f0eaff 100%); }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(139, 92, 246, 0.08);
        }
        .bottom-nav {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(139, 92, 246, 0.15);
        }
        .hide-scroll::-webkit-scrollbar { width: 3px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const CLASSES = ["أولى إعدادي", "ثانية إعدادي", "ثالثة إعدادي"];
        const MASTER_PASSWORD = "1427";
        
        const STORAGE_KEYS = {
            STUDENTS: "mar_boulus_students_v7",
            SERVANTS: "mar_boulus_servants_v7",
            TEAMS: "mar_boulus_teams_v7"
        };
        
        const loadData = (key, def=[]) => { 
            try { 
                const raw = localStorage.getItem(key); 
                return raw ? JSON.parse(raw) : def; 
            } catch(e) { return def; } 
        };
        
        const saveData = (key, data) => { 
            try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {} 
        };
        
        const genId = () => Date.now() + '-' + Math.random().toString(36).substr(2, 8);
        
        const formatBirthday = (dateStr) => { 
            if(!dateStr) return "—"; 
            let p = dateStr.split('-'); 
            if(p.length===3) return `${p[2]}/${p[1]}`; 
            return dateStr; 
        };
        
        const getUpcomingBirthdays = (students) => {
            const today = new Date(); 
            const year = today.getFullYear();
            const upcoming = [];
            students.forEach(s => {
                if(!s.birthday) return;
                let parts = s.birthday.split('-');
                if(parts.length!==3) return;
                let m = parseInt(parts[1]), d = parseInt(parts[2]);
                let next = new Date(year, m-1, d);
                if(next < today) next = new Date(year+1, m-1, d);
                let diff = Math.ceil((next - today) / (1000*3600*24));
                if(diff>=0 && diff<=30) upcoming.push({...s, daysLeft: diff, display: `${d}/${m}`});
            });
            return upcoming.sort((a,b) => a.daysLeft - b.daysLeft);
        };
        
        // دالة استيراد Excel
        const parseExcelToStudents = (data, manualClass, detectClassColumn = true) => {
            const rows = XLSX.utils.sheet_to_json(data, { header: 1, defval: "" });
            if(rows.length < 2) return { students: [], errors: [], classMapping: {} };
            
            const headers = rows[0].map(cell => String(cell || "").trim().toLowerCase());
            
            const nameIdx = headers.findIndex(h => h.includes("اسم") || h === "name" || h === "الاسم");
            const phoneIdx = headers.findIndex(h => h.includes("تليفون") || h.includes("هاتف") || h === "phone" || h === "mobile");
            const parentIdx = headers.findIndex(h => h.includes("ولي") || h === "parent" || h.includes("والد"));
            const addrIdx = headers.findIndex(h => h.includes("عنوان") || h === "address");
            const birthIdx = headers.findIndex(h => h.includes("ميلاد") || h.includes("تاريخ") || h === "birthday" || h === "dob");
            const classIdx = headers.findIndex(h => h.includes("صف") || h === "class" || h.includes("المرحلة") || h.includes("الفصل"));
            
            let nIdx = nameIdx !== -1 ? nameIdx : 0;
            let pIdx = phoneIdx !== -1 ? phoneIdx : (headers.length > 1 ? 1 : -1);
            
            const students = [];
            const classMapping = {};
            const validClasses = CLASSES;
            
            for(let i=1; i<rows.length; i++) {
                let row = rows[i];
                if(!row || row.length === 0) continue;
                let name = row[nIdx] ? String(row[nIdx]).trim() : "";
                if(!name) continue;
                
                let phone = (pIdx !== -1 && row[pIdx]) ? String(row[pIdx]).trim() : "";
                let parentPhone = (parentIdx !== -1 && row[parentIdx]) ? String(row[parentIdx]).trim() : "";
                let address = (addrIdx !== -1 && row[addrIdx]) ? String(row[addrIdx]).trim() : "";
                
                let birthdayRaw = (birthIdx !== -1 && row[birthIdx]) ? String(row[birthIdx]).trim() : "";
                let birthdayFmt = "";
                if(birthdayRaw) {
                    if(!isNaN(birthdayRaw) && birthdayRaw.length < 10 && Number(birthdayRaw) > 0) {
                        let dateObj = XLSX.SSF.parse_date_code(Number(birthdayRaw));
                        if(dateObj) birthdayFmt = `${dateObj.y}-${String(dateObj.m).padStart(2,'0')}-${String(dateObj.d).padStart(2,'0')}`;
                    } else {
                        let cleaned = birthdayRaw.replace(/\//g, '-');
                        let seg = cleaned.split('-');
                        if(seg.length === 3) {
                            let yr = seg[0].length === 4 ? seg[0] : (seg[2].length === 4 ? seg[2] : new Date().getFullYear());
                            let mon = seg[1], day = seg[0].length === 2 ? seg[0] : seg[2];
                            if(yr.length === 4 && mon && day) birthdayFmt = `${yr}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                        }
                    }
                }
                
                let targetClass = manualClass;
                if(detectClassColumn && classIdx !== -1 && row[classIdx]) {
                    let classRaw = String(row[classIdx]).trim();
                    let matchedClass = validClasses.find(c => classRaw.includes(c) || c.includes(classRaw));
                    if(matchedClass) {
                        targetClass = matchedClass;
                        classMapping[classRaw] = matchedClass;
                    }
                }
                
                students.push({
                    name, phone, parentPhone, address, 
                    birthday: birthdayFmt, 
                    class: targetClass,
                    points: 0,
                    attendance: {},
                    teamId: null
                });
            }
            return { students, errors: [], classMapping };
        };
        
        const App = () => {
            const [loggedIn, setLoggedIn] = useState(false);
            const [servantName, setServantName] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [activeTab, setActiveTab] = useState("home");
            const [students, setStudents] = useState([]);
            const [servants, setServants] = useState([]);
            const [teams, setTeams] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedClass, setSelectedClass] = useState(CLASSES[0]);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split("T")[0]);
            const [search, setSearch] = useState("");
            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [newStudent, setNewStudent] = useState({ name:"", phone:"", parentPhone:"", address:"", birthday:"" });
            const [selectedStudents, setSelectedStudents] = useState([]);
            const [editingStudent, setEditingStudent] = useState(null);
            const [importPreview, setImportPreview] = useState([]);
            const [importClass, setImportClass] = useState(CLASSES[0]);
            const [importDetectClass, setImportDetectClass] = useState(true);
            const [importInfo, setImportInfo] = useState("");
            
            // State للفرق
            const [showTeamModal, setShowTeamModal] = useState(false);
            const [newTeamName, setNewTeamName] = useState("");
            const [editingTeam, setEditingTeam] = useState(null);
            const [selectedTeamId, setSelectedTeamId] = useState(null);
            const [showPointsModal, setShowPointsModal] = useState(false);
            const [pointsTeamId, setPointsTeamId] = useState(null);
            const [pointsAmount, setPointsAmount] = useState(5);
            const [pointsReason, setPointsReason] = useState("");
            
            // تحميل البيانات
            useEffect(() => {
                const storedStudents = loadData(STORAGE_KEYS.STUDENTS, []);
                const storedTeams = loadData(STORAGE_KEYS.TEAMS, []);
                const storedServants = loadData(STORAGE_KEYS.SERVANTS, []);
                setStudents(storedStudents);
                setTeams(storedTeams);
                setServants(storedServants);
                setLoading(false);
            }, []);
            
            useEffect(() => { if(!loading) saveData(STORAGE_KEYS.STUDENTS, students); }, [students, loading]);
            useEffect(() => { if(!loading) saveData(STORAGE_KEYS.TEAMS, teams); }, [teams, loading]);
            useEffect(() => { if(!loading) saveData(STORAGE_KEYS.SERVANTS, servants); }, [servants, loading]);
            
            const handleLogin = () => {
                if(!servantName.trim()) { setError("الرجاء إدخال اسم الخادم"); return; }
                if(password !== MASTER_PASSWORD) { setError("كلمة المرور غير صحيحة"); return; }
                const exists = servants.find(s => s.name === servantName);
                if(!exists) {
                    setServants(prev => [...prev, { id: genId(), name: servantName, lastLogin: new Date().toLocaleString('ar-EG') }]);
                }
                setLoggedIn(true);
                setError("");
            };
            
            const handleLogout = () => { setLoggedIn(false); setServantName(""); setPassword(""); };
            
            const addStudent = () => {
                if(!newStudent.name || !newStudent.phone) { alert("الاسم والتليفون مطلوبين"); return; }
                setStudents(prev => [...prev, {
                    id: genId(),
                    ...newStudent,
                    class: selectedClass,
                    points: 0,
                    attendance: {},
                    teamId: null,
                    addedBy: servantName,
                    addedDate: new Date().toLocaleString('ar-EG')
                }]);
                setNewStudent({ name:"", phone:"", parentPhone:"", address:"", birthday:"" });
                setShowAddModal(false);
            };
            
            const handleFileUpload = (file) => {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const { students: parsedStudents, errors, classMapping } = parseExcelToStudents(sheet, importClass, importDetectClass);
                    
                    if(parsedStudents.length === 0) {
                        alert("❌ لم يتم العثور على بيانات صالحة");
                        return;
                    }
                    
                    const classCount = {};
                    parsedStudents.forEach(s => { classCount[s.class] = (classCount[s.class] || 0) + 1; });
                    let infoText = `📊 تم قراءة ${parsedStudents.length} طالب.\n`;
                    for(const [cls, count] of Object.entries(classCount)) {
                        infoText += `• الصف ${cls}: ${count} طالب\n`;
                    }
                    setImportInfo(infoText);
                    setImportPreview(parsedStudents);
                };
                reader.readAsArrayBuffer(file);
            };
            
            const confirmImport = () => {
                if(!importPreview.length) return;
                const withIds = importPreview.map(s => ({ 
                    ...s, 
                    id: genId(), 
                    addedBy: servantName, 
                    addedDate: new Date().toLocaleString('ar-EG'),
                    points: 0,
                    attendance: {},
                    teamId: null
                }));
                setStudents(prev => [...prev, ...withIds]);
                alert(`✅ تم استيراد ${withIds.length} طالب بنجاح!`);
                setImportPreview([]);
                setImportInfo("");
                setShowImportModal(false);
            };
            
            const updateStudent = () => {
                if(!editingStudent.name || !editingStudent.phone) { alert("الاسم والتليفون مطلوبين"); return; }
                setStudents(prev => prev.map(s => s.id === editingStudent.id ? editingStudent : s));
                setEditingStudent(null);
            };
            
            const deleteStudent = (id, name) => {
                if(confirm(`حذف ${name} نهائياً؟`)) {
                    setStudents(prev => prev.filter(s => s.id !== id));
                }
            };
            
            const addPersonalPoints = (id, amount = 5) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, points: (s.points || 0) + amount } : s));
            };
            
            const updateAttendance = (ids, status) => {
                if(!ids.length) { alert("اختر طالباً واحداً على الأقل"); return; }
                setStudents(prev => prev.map(s => ids.includes(s.id) ? { ...s, attendance: { ...(s.attendance || {}), [selectedDate]: status } } : s));
                setSelectedStudents([]);
            };
            
            const getAttendanceRate = (student) => {
                const records = Object.values(student.attendance || {});
                if(!records.length) return 0;
                return Math.round((records.filter(r => r === true).length / records.length) * 100);
            };
            
            // دوال الفرق
            const createTeam = () => {
                if(!newTeamName.trim()) { alert("الرجاء إدخال اسم الفريق"); return; }
                if(teams.find(t => t.name === newTeamName.trim())) { alert("يوجد فريق بنفس الاسم"); return; }
                setTeams([...teams, {
                    id: genId(),
                    name: newTeamName.trim(),
                    createdAt: new Date().toLocaleString('ar-EG'),
                    createdBy: servantName,
                    teamPoints: 0,
                    pointsHistory: []
                }]);
                setNewTeamName("");
                setShowTeamModal(false);
            };
            
            const updateTeam = () => {
                if(!editingTeam.name.trim()) { alert("الرجاء إدخال اسم الفريق"); return; }
                setTeams(teams.map(t => t.id === editingTeam.id ? { ...t, name: editingTeam.name } : t));
                setEditingTeam(null);
                setShowTeamModal(false);
            };
            
            const deleteTeam = (teamId, teamName) => {
                if(confirm(`حذف فريق "${teamName}" نهائياً؟`)) {
                    setStudents(students.map(s => s.teamId === teamId ? { ...s, teamId: null } : s));
                    setTeams(teams.filter(t => t.id !== teamId));
                    if(selectedTeamId === teamId) setSelectedTeamId(null);
                }
            };
            
            const addTeamPoints = (teamId, amount, reason) => {
                setTeams(teams.map(t => {
                    if(t.id === teamId) {
                        const newPoints = (t.teamPoints || 0) + amount;
                        const newHistory = [...(t.pointsHistory || []), {
                            id: genId(),
                            amount: amount,
                            reason: reason || "نقاط إضافية",
                            addedBy: servantName,
                            date: new Date().toLocaleString('ar-EG'),
                            newTotal: newPoints
                        }];
                        return { ...t, teamPoints: newPoints, pointsHistory: newHistory };
                    }
                    return t;
                }));
                setShowPointsModal(false);
                setPointsAmount(5);
                setPointsReason("");
                setPointsTeamId(null);
            };
            
            const addPointsToAllTeamMembers = (teamId, amount) => {
                const team = teams.find(t => t.id === teamId);
                if(!team) return;
                const memberIds = students.filter(s => s.teamId === teamId).map(s => s.id);
                if(memberIds.length === 0) {
                    alert(`⚠️ لا يوجد أعضاء في فريق "${team.name}"`);
                    return;
                }
                setStudents(prev => prev.map(s => {
                    if(memberIds.includes(s.id)) {
                        return { ...s, points: (s.points || 0) + amount };
                    }
                    return s;
                }));
                alert(`✅ تم إضافة ${amount} نقطة شخصية لـ ${memberIds.length} عضو`);
            };
            
            const assignToTeam = (studentId, teamId) => {
                setStudents(students.map(s => s.id === studentId ? { ...s, teamId: teamId } : s));
            };
            
            const removeFromTeam = (studentId) => {
                setStudents(students.map(s => s.id === studentId ? { ...s, teamId: null } : s));
            };
            
            const getTeamMembers = (teamId) => students.filter(s => s.teamId === teamId);
            
            const filteredStudents = students.filter(s => s.class === selectedClass && (!search || s.name.includes(search)));
            const selectedTeam = teams.find(t => t.id === selectedTeamId);
            const teamMembers = selectedTeam ? getTeamMembers(selectedTeam.id) : [];
            const rankedTeams = [...teams].sort((a, b) => (b.teamPoints || 0) - (a.teamPoints || 0));
            const upcomingBirthdays = getUpcomingBirthdays(students);
            
            if(loading) {
                return <div className="h-screen flex items-center justify-center gradient-bg"><i className="fas fa-church text-6xl text-purple-400 animate-pulse"></i></div>;
            }
            
            if(!loggedIn) {
                return (
                    <div className="min-h-screen gradient-bg flex items-center justify-center p-5">
                        <div className="glass-card w-full max-w-md p-7">
                            <div className="text-center mb-6">
                                <div className="w-20 h-20 bg-gradient-to-br from-purple-100 to-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                    <i className="fas fa-cross text-4xl text-purple-600"></i>
                                </div>
                                <h1 className="text-2xl font-bold text-purple-700">مار بولس الرسول</h1>
                                <p className="text-gray-500 text-sm mt-1">نظام مدارس الأحد • المرحلة الإعدادية</p>
                            </div>
                            {error && <div className="bg-red-50 text-red-600 p-3 rounded-2xl text-sm mb-4 text-center">{error}</div>}
                            <div className="space-y-3">
                                <input type="text" className="w-full p-3 border border-gray-200 rounded-2xl bg-gray-50" placeholder="اسم الخادم" value={servantName} onChange={e => setServantName(e.target.value)} />
                                <input type="password" className="w-full p-3 border border-gray-200 rounded-2xl bg-gray-50" placeholder="كلمة المرور" value={password} onChange={e => setPassword(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleLogin()} />
                                <button onClick={handleLogin} className="w-full bg-purple-600 text-white py-3 rounded-2xl font-bold">دخول</button>
                            </div>
                        </div>
                    </div>
                );
            }
            
            const TeamsPanel = () => (
                <div className="space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className="font-bold text-xl"><i className="fas fa-users text-purple-500 ml-2"></i>الفرق</h2>
                        <button onClick={() => { setEditingTeam(null); setNewTeamName(""); setShowTeamModal(true); }} className="bg-purple-600 text-white px-4 py-2 rounded-full text-sm"><i className="fas fa-plus ml-1"></i>فريق جديد</button>
                    </div>
                    
                    {teams.length > 0 && (
                        <div className="glass-card p-4">
                            <h3 className="font-bold mb-2"><i className="fas fa-trophy text-amber-500"></i> ترتيب الفرق (نقاط جماعية)</h3>
                            {rankedTeams.map((team, idx) => (
                                <div key={team.id} className="flex justify-between items-center py-2 border-b border-gray-100">
                                    <div className="flex items-center gap-2">
                                        <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${idx === 0 ? 'bg-amber-400 text-white' : 'bg-gray-200'}`}>{idx + 1}</span>
                                        <span>{team.name}</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-purple-600">{team.teamPoints || 0} نقطة</span>
                                        <button onClick={() => { setPointsTeamId(team.id); setShowPointsModal(true); }} className="bg-green-100 text-green-600 px-2 py-1 rounded-full text-xs"><i className="fas fa-plus-circle"></i> إضافة</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    <div className="flex flex-wrap gap-2">
                        {teams.map(team => (
                            <button key={team.id} onClick={() => setSelectedTeamId(team.id)} className={`px-4 py-2 rounded-full text-sm ${selectedTeamId === team.id ? 'bg-purple-600 text-white' : 'bg-white text-purple-600 border border-purple-200'}`}>
                                {team.name} ({team.teamPoints || 0})
                            </button>
                        ))}
                        {teams.length === 0 && <p className="text-gray-400">لا توجد فرق، أضف فريقاً جديداً</p>}
                    </div>
                    
                    {selectedTeam && (
                        <div className="glass-card p-5">
                            <div className="flex justify-between items-center border-b pb-3 mb-3">
                                <div>
                                    <h3 className="font-bold text-lg">{selectedTeam.name}</h3>
                                    <p className="text-xs text-gray-400">تاريخ الإنشاء: {selectedTeam.createdAt}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { setEditingTeam({...selectedTeam}); setShowTeamModal(true); }} className="text-blue-500 text-sm bg-blue-50 px-3 py-1 rounded-full"><i className="fas fa-edit"></i> تعديل</button>
                                    <button onClick={() => deleteTeam(selectedTeam.id, selectedTeam.name)} className="text-red-500 text-sm bg-red-50 px-3 py-1 rounded-full"><i className="fas fa-trash"></i> حذف</button>
                                </div>
                            </div>
                            
                            <div className="bg-gradient-to-r from-purple-50 to-indigo-50 rounded-2xl p-4 mb-4 text-center">
                                <div className="text-sm text-gray-500">نقاط الفريق الجماعية</div>
                                <div className="text-4xl font-bold text-purple-700">{selectedTeam.teamPoints || 0}</div>
                                <div className="flex gap-2 justify-center mt-2">
                                    <button onClick={() => { setPointsTeamId(selectedTeam.id); setShowPointsModal(true); }} className="bg-green-500 text-white px-4 py-1 rounded-full text-sm"><i className="fas fa-plus-circle"></i> إضافة نقاط للفريق</button>
                                    <button onClick={() => addPointsToAllTeamMembers(selectedTeam.id, 5)} className="bg-amber-500 text-white px-4 py-1 rounded-full text-sm"><i className="fas fa-users"></i> +5 لكل الأعضاء</button>
                                </div>
                            </div>
                            
                            <h4 className="font-semibold mb-2">أعضاء الفريق ({teamMembers.length})</h4>
                            {teamMembers.length === 0 ? (
                                <div className="text-center text-gray-400 p-4 bg-gray-50 rounded-2xl">لا يوجد أعضاء</div>
                            ) : (
                                <div className="space-y-2 max-h-64 overflow-auto">
                                    {teamMembers.map(m => (
                                        <div key={m.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                                            <div>
                                                <div className="font-bold">{m.name}</div>
                                                <div className="text-xs text-gray-500">{m.class} • نقاط شخصية: {m.points || 0}</div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => addPersonalPoints(m.id, 5)} className="text-amber-600 text-xs bg-amber-50 px-2 py-1 rounded-full"><i className="fas fa-star"></i> +5</button>
                                                <button onClick={() => removeFromTeam(m.id)} className="text-red-500 text-xs bg-white px-2 py-1 rounded-full">إزالة</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            <div className="mt-4 pt-3 border-t">
                                <h4 className="font-semibold mb-2">إضافة طلاب للفريق</h4>
                                <div className="space-y-2 max-h-48 overflow-auto">
                                    {students.filter(s => !s.teamId && s.class === selectedClass).map(s => (
                                        <div key={s.id} className="flex justify-between items-center bg-purple-50 p-2 rounded-xl">
                                            <span>{s.name} - {s.class}</span>
                                            <button onClick={() => assignToTeam(s.id, selectedTeam.id)} className="bg-purple-600 text-white text-xs px-3 py-1 rounded-full">إضافة</button>
                                        </div>
                                    ))}
                                    {students.filter(s => !s.teamId && s.class === selectedClass).length === 0 && (
                                        <p className="text-gray-400 text-sm">لا يوجد طلاب غير منضمين</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <div className="glass-card p-4">
                        <h4 className="font-bold mb-2">إحصائيات الفرق</h4>
                        <div className="grid grid-cols-2 gap-2 text-sm">
                            <div>عدد الفرق: {teams.length}</div>
                            <div>طلاب منضمين: {students.filter(s => s.teamId).length}</div>
                            <div>طلاب بدون فريق: {students.filter(s => !s.teamId).length}</div>
                            <div>إجمالي نقاط الفرق: {teams.reduce((sum, t) => sum + (t.teamPoints || 0), 0)}</div>
                        </div>
                    </div>
                </div>
            );
            
            return (
                <div className="gradient-bg h-screen flex flex-col overflow-hidden">
                    <div className="glass-card mx-4 mt-4 px-5 py-3 flex justify-between items-center">
                        <div>
                            <h1 className="text-lg font-bold text-purple-700"><i className="fas fa-church text-purple-500 ml-1"></i> مار بولس</h1>
                            <p className="text-xs text-gray-400">مرحباً {servantName}</p>
                        </div>
                        <button onClick={handleLogout} className="bg-gray-100 text-gray-600 px-4 py-2 rounded-full text-sm"><i className="fas fa-sign-out-alt ml-1"></i> خروج</button>
                    </div>
                    
                    <div className="px-4 mt-3">
                        <div className="flex gap-2 overflow-x-auto pb-2 hide-scroll">
                            {CLASSES.map(c => (
                                <button key={c} onClick={() => { setSelectedClass(c); setSearch(""); }} className={`px-5 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap ${selectedClass === c ? 'bg-purple-600 text-white' : 'bg-white text-gray-600 border'}`}>
                                    {c}
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto px-4 pb-24 mt-3 hide-scroll">
                        {activeTab === "home" && (
                            <div>
                                <div className="grid grid-cols-3 gap-3 mb-5">
                                    <div className="glass-card p-4 text-center">
                                        <i className="fas fa-users text-2xl text-purple-500"></i>
                                        <div className="text-2xl font-bold">{students.length}</div>
                                        <div className="text-xs">إجمالي الطلاب</div>
                                    </div>
                                    <div className="glass-card p-4 text-center">
                                        <i className="fas fa-trophy text-2xl text-amber-500"></i>
                                        <div className="text-2xl font-bold">{students.reduce((a,b)=>a+(b.points||0),0)}</div>
                                        <div className="text-xs">نقاط شخصية</div>
                                    </div>
                                    <div className="glass-card p-4 text-center">
                                        <i className="fas fa-medal text-2xl text-purple-500"></i>
                                        <div className="text-2xl font-bold">{teams.reduce((a,b)=>a+(b.teamPoints||0),0)}</div>
                                        <div className="text-xs">نقاط الفرق</div>
                                    </div>
                                </div>
                                <div className="glass-card p-4">
                                    <div className="flex justify-between">
                                        <h3 className="font-bold"><i className="fas fa-calendar-check text-purple-500"></i> حضور اليوم</h3>
                                        <span className="text-sm">{selectedDate}</span>
                                    </div>
                                    <div className="flex justify-between text-sm mt-2">
                                        <span>{selectedClass}</span>
                                        <span>{filteredStudents.filter(s=>s.attendance?.[selectedDate]===true).length} / {filteredStudents.length}</span>
                                    </div>
                                    <div className="mt-2 h-2 bg-gray-100 rounded-full">
                                        <div className="bg-purple-500 h-full rounded-full" style={{width: `${filteredStudents.length ? (filteredStudents.filter(s=>s.attendance?.[selectedDate]===true).length / filteredStudents.length * 100) : 0}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === "students" && (
                            <div>
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold text-lg"><i className="fas fa-id-card text-purple-500"></i> كروت الطلاب</h2>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowImportModal(true)} className="bg-green-600 text-white px-4 py-2 rounded-full text-sm"><i className="fas fa-file-excel ml-1"></i> استيراد</button>
                                        <button onClick={() => setShowAddModal(true)} className="bg-purple-600 text-white px-4 py-2 rounded-full text-sm"><i className="fas fa-plus ml-1"></i> إضافة</button>
                                    </div>
                                </div>
                                <input type="text" placeholder="بحث بالاسم..." className="w-full p-3 border-0 rounded-2xl bg-white shadow-sm mb-4" value={search} onChange={e => setSearch(e.target.value)}/>
                                <div className="space-y-3">
                                    {filteredStudents.map(s => {
                                        const studentTeam = teams.find(t => t.id === s.teamId);
                                        return (
                                            <div key={s.id} className="glass-card p-4">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h3 className="font-bold text-lg">{s.name}</h3>
                                                        <div className="text-xs text-gray-400">{s.class}</div>
                                                        {studentTeam && <div className="text-xs text-purple-600 mt-1"><i className="fas fa-flag-checkered"></i> فريق: {studentTeam.name}</div>}
                                                    </div>
                                                    <div className="text-center bg-amber-50 px-3 py-1 rounded-full">
                                                        <div className="text-xs text-amber-600">نقاطي</div>
                                                        <div className="font-bold text-amber-600">{s.points || 0}</div>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 mt-3 text-sm">
                                                    <div><i className="fas fa-phone-alt text-purple-400"></i> {s.phone}</div>
                                                    <div><i className="fas fa-chart-line text-green-500"></i> حضور: {getAttendanceRate(s)}%</div>
                                                    {s.birthday && <div><i className="fas fa-birthday-cake text-pink-500"></i> ميلاد: {formatBirthday(s.birthday)}</div>}
                                                </div>
                                                <div className="flex gap-2 mt-3 pt-2 border-t">
                                                    <button onClick={() => setEditingStudent({...s})} className="flex-1 bg-gray-100 py-2 rounded-xl text-sm"><i className="fas fa-edit text-blue-500"></i> تعديل</button>
                                                    <button onClick={() => addPersonalPoints(s.id, 5)} className="flex-1 bg-amber-50 text-amber-600 py-2 rounded-xl text-sm"><i className="fas fa-plus-circle"></i> +5</button>
                                                    <button onClick={() => deleteStudent(s.id, s.name)} className="bg-red-50 text-red-500 px-3 py-2 rounded-xl text-sm"><i className="fas fa-trash"></i></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {filteredStudents.length === 0 && <div className="text-center text-gray-400 py-10">لا يوجد طلاب</div>}
                                </div>
                            </div>
                        )}
                        
                        {activeTab === "attendance" && (
                            <div className="glass-card p-5">
                                <h2 className="font-bold text-lg mb-3">تسجيل الحضور</h2>
                                <input type="date" className="w-full p-3 border-0 rounded-2xl bg-gray-50 mb-4" value={selectedDate} onChange={e => setSelectedDate(e.target.value)}/>
                                <div className="flex gap-2 mb-4">
                                    <button onClick={() => setSelectedStudents(filteredStudents.map(s=>s.id))} className="bg-gray-700 text-white px-4 py-2 rounded-full text-sm">تحديد الكل</button>
                                    <button onClick={() => updateAttendance(selectedStudents, true)} className="flex-1 bg-green-600 text-white py-2.5 rounded-full">حضور</button>
                                    <button onClick={() => updateAttendance(selectedStudents, false)} className="flex-1 bg-red-500 text-white py-2.5 rounded-full">غياب</button>
                                </div>
                                <div className="space-y-2 max-h-[55vh] overflow-auto">
                                    {filteredStudents.map(s => (
                                        <div key={s.id} onClick={() => setSelectedStudents(prev => prev.includes(s.id) ? prev.filter(i=>i!==s.id) : [...prev, s.id])} className={`p-3 rounded-2xl border flex justify-between items-center cursor-pointer ${selectedStudents.includes(s.id) ? 'bg-purple-50 border-purple-300' : 'bg-white'}`}>
                                            <span>{s.name}</span>
                                            {s.attendance?.[selectedDate] !== undefined && <span className={`text-sm ${s.attendance[selectedDate] ? 'text-green-600' : 'text-red-500'}`}>{s.attendance[selectedDate] ? 'حاضر' : 'غائب'}</span>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {activeTab === "teams" && <TeamsPanel />}
                        
                        {/* تبويب أعياد الميلاد */}
                        {activeTab === "birthdays" && (
                            <div className="glass-card p-5">
                                <h2 className="font-bold text-lg mb-3"><i className="fas fa-birthday-cake text-pink-500"></i> أعياد الميلاد</h2>
                                
                                {upcomingBirthdays.length > 0 && (
                                    <div className="mb-5">
                                        <h3 className="font-semibold text-amber-700 mb-2"><i className="fas fa-star-of-life"></i> أعياد قادمة (30 يوماً)</h3>
                                        {upcomingBirthdays.map(s => (
                                            <div key={s.id} className="flex justify-between items-center p-2 border-b border-pink-100">
                                                <div>
                                                    <span className="font-bold">{s.name}</span>
                                                    <span className="text-xs text-gray-500 mr-2">({s.class})</span>
                                                </div>
                                                <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-sm">بعد {s.daysLeft} يوم</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                <h3 className="font-semibold mt-3 mb-2"><i className="fas fa-calendar-alt"></i> جميع التواريخ</h3>
                                <div className="space-y-1 max-h-96 overflow-auto">
                                    {students.filter(s => s.birthday).sort((a,b) => {
                                        let aMon = parseInt(a.birthday.split('-')[1]) || 0;
                                        let bMon = parseInt(b.birthday.split('-')[1]) || 0;
                                        if(aMon !== bMon) return aMon - bMon;
                                        let aDay = parseInt(a.birthday.split('-')[2]) || 0;
                                        let bDay = parseInt(b.birthday.split('-')[2]) || 0;
                                        return aDay - bDay;
                                    }).map(s => {
                                        let p = s.birthday.split('-');
                                        return (
                                            <div key={s.id} className="flex justify-between items-center p-2 border-b border-gray-100">
                                                <span>{s.name} <span className="text-xs text-gray-400">({s.class})</span></span>
                                                <span className="text-purple-600 font-semibold">{p[2]}/{p[1]}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {students.filter(s => s.birthday).length === 0 && (
                                    <div className="text-center text-gray-400 py-10">
                                        <i className="fas fa-cake-candles text-5xl mb-2"></i>
                                        <p>لا توجد أعياد ميلاد مسجلة</p>
                                        <button onClick={() => setShowAddModal(true)} className="mt-3 text-purple-600 text-sm">➕ أضف طالباً مع تاريخ ميلاده</button>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {activeTab === "reports" && (
                            <div className="glass-card p-5">
                                <h2 className="font-bold text-lg mb-3">ترتيب النقاط الشخصية</h2>
                                {filteredStudents.sort((a,b)=>(b.points||0)-(a.points||0)).map((s,i) => (
                                    <div key={s.id} className="flex justify-between p-2 border-b">
                                        <span>{i+1}. {s.name}</span>
                                        <span className="text-amber-600 font-bold">{s.points||0} نقطة</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {activeTab === "servants" && (
                            <div className="glass-card p-5">
                                <h2 className="font-bold text-lg mb-3">فريق الخدمة</h2>
                                {servants.map(s => (
                                    <div key={s.id} className="flex justify-between items-center p-2 border-b">
                                        <div><i className="fas fa-user-check text-green-500"></i> {s.name}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    
                    {/* القائمة السفلية - مع إضافة أعياد الميلاد */}
                    <div className="bottom-nav fixed bottom-0 left-0 right-0 py-2 px-3 flex justify-around">
                        {[
                            {id:"home", icon:"fas fa-home", label:"الرئيسية"},
                            {id:"students", icon:"fas fa-id-card", label:"الكروت"},
                            {id:"attendance", icon:"fas fa-calendar-check", label:"الحضور"},
                            {id:"teams", icon:"fas fa-users", label:"الفرق"},
                            {id:"birthdays", icon:"fas fa-birthday-cake", label:"أعياد"},
                            {id:"reports", icon:"fas fa-chart-simple", label:"تقرير"},
                            {id:"servants", icon:"fas fa-user-friends", label:"الخدام"}
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className="flex flex-col items-center flex-1">
                                <i className={`${tab.icon} text-xl ${activeTab === tab.id ? 'text-purple-600' : 'text-gray-400'}`}></i>
                                <span className={`text-[10px] ${activeTab === tab.id ? 'text-purple-600 font-semibold' : 'text-gray-400'}`}>{tab.label}</span>
                            </button>
                        ))}
                    </div>
                    
                    {activeTab === "students" && (
                        <button className="fixed bottom-20 left-4 bg-purple-600 w-14 h-14 rounded-full shadow-lg flex items-center justify-center" onClick={() => setShowAddModal(true)}>
                            <i className="fas fa-plus text-white text-2xl"></i>
                        </button>
                    )}
                    
                    {/* مودال استيراد Excel */}
                    {showImportModal && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={()=>setShowImportModal(false)}>
                            <div className="bg-white rounded-3xl p-6 w-full max-w-md" onClick={e=>e.stopPropagation()}>
                                <h3 className="font-bold text-lg mb-3"><i className="fas fa-file-excel text-green-600"></i> استيراد Excel</h3>
                                <div className="mb-3">
                                    <label className="block text-sm mb-1">الفصل الافتراضي:</label>
                                    <select className="w-full p-3 border rounded-2xl" value={importClass} onChange={e=>setImportClass(e.target.value)}>
                                        {CLASSES.map(c=><option key={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="mb-3 flex items-center gap-2">
                                    <input type="checkbox" id="detectClass" checked={importDetectClass} onChange={e=>setImportDetectClass(e.target.checked)}/>
                                    <label htmlFor="detectClass" className="text-sm">اكتشاف الصف تلقائياً</label>
                                </div>
                                <div className="border-2 border-dashed border-purple-300 rounded-2xl p-6 text-center cursor-pointer bg-purple-50/30" onClick={()=>document.getElementById('excelImp').click()}>
                                    <i className="fas fa-cloud-upload-alt text-4xl text-purple-400"></i>
                                    <p className="text-sm mt-1">اختر ملف Excel</p>
                                    <input type="file" id="excelImp" accept=".xlsx,.xls" className="hidden" onChange={e=>e.target.files && handleFileUpload(e.target.files[0])}/>
                                </div>
                                {importInfo && <div className="mt-3 p-2 bg-blue-50 rounded-2xl text-sm">{importInfo}</div>}
                                {importPreview.length > 0 && (
                                    <div className="mt-4">
                                        <p className="font-bold text-green-600">{importPreview.length} طالب جاهز</p>
                                        <button onClick={confirmImport} className="w-full bg-green-600 text-white py-3 rounded-2xl mt-2">تأكيد الاستيراد</button>
                                    </div>
                                )}
                                <button onClick={()=>{setShowImportModal(false); setImportPreview([]);}} className="w-full mt-3 text-gray-500">إغلاق</button>
                            </div>
                        </div>
                    )}
                    
                    {/* مودال إضافة نقاط للفريق */}
                    {showPointsModal && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={() => { setShowPointsModal(false); }}>
                            <div className="bg-white rounded-3xl p-6 w-full max-w-md" onClick={e=>e.stopPropagation()}>
                                <h3 className="font-bold text-xl mb-4"><i className="fas fa-trophy text-amber-500"></i> إضافة نقاط للفريق</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm mb-1">عدد النقاط</label>
                                        <div className="flex gap-2">
                                            <input type="number" className="flex-1 p-3 border rounded-2xl" value={pointsAmount} onChange={e => setPointsAmount(parseInt(e.target.value) || 0)} min="1"/>
                                            <button onClick={() => setPointsAmount(5)} className="bg-gray-100 px-4 rounded-2xl">5</button>
                                            <button onClick={() => setPointsAmount(10)} className="bg-gray-100 px-4 rounded-2xl">10</button>
                                            <button onClick={() => setPointsAmount(20)} className="bg-gray-100 px-4 rounded-2xl">20</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-1">سبب الإضافة</label>
                                        <input type="text" className="w-full p-3 border rounded-2xl" placeholder="مثال: فوز في مسابقة" value={pointsReason} onChange={e => setPointsReason(e.target.value)}/>
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-5">
                                    <button onClick={() => pointsTeamId && addTeamPoints(pointsTeamId, pointsAmount, pointsReason)} className="flex-1 bg-green-600 text-white py-3 rounded-2xl">إضافة</button>
                                    <button onClick={() => { setShowPointsModal(false); setPointsTeamId(null); }} className="flex-1 bg-gray-200 py-3 rounded-2xl">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/40 flex items-end justify-center z-50" onClick={() => setShowAddModal(false)}>
                            <div className="bg-white w-full rounded-t-3xl p-6 max-h-[85vh] overflow-auto" onClick={e=>e.stopPropagation()}>
                                <h3 className="font-bold text-xl mb-4">إضافة طالب جديد</h3>
                                <div className="space-y-3">
                                    <input type="text" placeholder="الاسم الكامل" className="w-full p-3 border rounded-2xl" value={newStudent.name} onChange={e=>setNewStudent({...newStudent,name:e.target.value})}/>
                                    <input type="tel" placeholder="رقم التليفون" className="w-full p-3 border rounded-2xl" value={newStudent.phone} onChange={e=>setNewStudent({...newStudent,phone:e.target.value})}/>
                                    <input type="tel" placeholder="تليفون ولي الأمر" className="w-full p-3 border rounded-2xl" value={newStudent.parentPhone} onChange={e=>setNewStudent({...newStudent,parentPhone:e.target.value})}/>
                                    <input type="text" placeholder="العنوان" className="w-full p-3 border rounded-2xl" value={newStudent.address} onChange={e=>setNewStudent({...newStudent,address:e.target.value})}/>
                                    <input type="date" className="w-full p-3 border rounded-2xl" value={newStudent.birthday} onChange={e=>setNewStudent({...newStudent,birthday:e.target.value})}/>
                                </div>
                                <div className="flex gap-3 mt-5">
                                    <button onClick={addStudent} className="flex-1 bg-purple-600 text-white py-3 rounded-2xl font-bold">حفظ</button>
                                    <button onClick={()=>setShowAddModal(false)} className="flex-1 bg-gray-200 py-3 rounded-2xl">إلغاء</button>
                                </div>
                                <button onClick={()=>{setShowAddModal(false); setShowImportModal(true);}} className="w-full mt-3 text-purple-600 text-sm"><i className="fas fa-file-excel"></i> استيراد من Excel</button>
                            </div>
                        </div>
                    )}
                    
                    {showTeamModal && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={()=>{setShowTeamModal(false); setEditingTeam(null);}}>
                            <div className="bg-white rounded-3xl p-6 w-full max-w-md" onClick={e=>e.stopPropagation()}>
                                <h3 className="font-bold text-xl mb-4">{editingTeam ? 'تعديل الفريق' : 'فريق جديد'}</h3>
                                <input type="text" placeholder="اسم الفريق" className="w-full p-3 border rounded-2xl mb-4" value={editingTeam ? editingTeam.name : newTeamName} onChange={e => editingTeam ? setEditingTeam({...editingTeam, name: e.target.value}) : setNewTeamName(e.target.value)}/>
                                <div className="flex gap-3">
                                    <button onClick={editingTeam ? updateTeam : createTeam} className="flex-1 bg-purple-600 text-white py-3 rounded-2xl font-bold">حفظ</button>
                                    <button onClick={()=>{setShowTeamModal(false); setEditingTeam(null);}} className="flex-1 bg-gray-200 py-3 rounded-2xl">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {editingStudent && (
                        <div className="fixed inset-0 bg-black/40 flex items-end justify-center z-50" onClick={()=>setEditingStudent(null)}>
                            <div className="bg-white w-full rounded-t-3xl p-6" onClick={e=>e.stopPropagation()}>
                                <h3 className="font-bold text-xl mb-3">تعديل البيانات</h3>
                                <div className="space-y-3">
                                    <input className="w-full p-3 border rounded-2xl" value={editingStudent.name} onChange={e=>setEditingStudent({...editingStudent,name:e.target.value})}/>
                                    <input className="w-full p-3 border rounded-2xl" value={editingStudent.phone} onChange={e=>setEditingStudent({...editingStudent,phone:e.target.value})}/>
                                    <input className="w-full p-3 border rounded-2xl" value={editingStudent.parentPhone||""} onChange={e=>setEditingStudent({...editingStudent,parentPhone:e.target.value})}/>
                                    <input className="w-full p-3 border rounded-2xl" value={editingStudent.address||""} onChange={e=>setEditingStudent({...editingStudent,address:e.target.value})}/>
                                    <input type="date" className="w-full p-3 border rounded-2xl" value={editingStudent.birthday||""} onChange={e=>setEditingStudent({...editingStudent,birthday:e.target.value})}/>
                                </div>
                                <div className="flex gap-2 mt-4">
                                    <button onClick={updateStudent} className="flex-1 bg-purple-600 text-white py-3 rounded-2xl font-bold">حفظ</button>
                                    <button onClick={()=>setEditingStudent(null)} className="flex-1 bg-gray-200 py-3 rounded-2xl">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
