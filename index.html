<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مدارس الأحد - جمعية مار بولس | أعياد الميلاد</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <!-- Flatpickr for date picker (optional but nice) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <style>
        * { font-family: 'Tajawal', system-ui, sans-serif; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .birthday-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: bold; display: inline-flex; align-items: center; gap: 0.25rem; }
        .upcoming-birthday { background-color: #fff3e0; border-right: 4px solid #f59e0b; transition: all 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const CLASSES = ["أولى ابتدائي", "ثانية ابتدائي", "ثالثة ابتدائي", "رابعة ابتدائي", "خامسة ابتدائي", "سادسة ابتدائي", "أولى إعدادي", "ثانية إعدادي", "ثالثة إعدادي", "أولى ثانوي", "ثانية ثانوي", "ثالثة ثانوي"];
        const MASTER_PASSWORD = "1427";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA4wKyQwVJv7GbJoO6ZoDW4McE67QVkdBc",
            authDomain: "sunday-school-system-71e0a.firebaseapp.com",
            projectId: "sunday-school-system-71e0a",
            storageBucket: "sunday-school-system-71e0a.firebasestorage.app",
            messagingSenderId: "725017954112",
            appId: "1:725017954112:web:a4ab42bdc35d2b1b2edca5",
            measurementId: "G-2XH12G7D5P"
        };
        
        let db;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            console.log("✅ Firebase connected");
        } catch(e) {
            console.error("Firebase error:", e);
        }
        
        // helper: format birthday for display (DD/MM)
        const formatBirthday = (dateStr) => {
            if (!dateStr) return "غير محدد";
            const parts = dateStr.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}`;
            return dateStr;
        };
        
        // get upcoming birthdays within next 30 days
        const getUpcomingBirthdays = (studentsList) => {
            const today = new Date();
            const currentYear = today.getFullYear();
            const upcoming = [];
            
            studentsList.forEach(student => {
                if (!student.birthday) return;
                const parts = student.birthday.split('-'); // YYYY-MM-DD
                if (parts.length !== 3) return;
                const birthMonth = parseInt(parts[1], 10);
                const birthDay = parseInt(parts[2], 10);
                let nextBirthday = new Date(currentYear, birthMonth - 1, birthDay);
                
                if (nextBirthday < today) {
                    nextBirthday = new Date(currentYear + 1, birthMonth - 1, birthDay);
                }
                const diffDays = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
                if (diffDays >= 0 && diffDays <= 30) {
                    upcoming.push({
                        ...student,
                        nextBirthdayDate: nextBirthday,
                        daysLeft: diffDays,
                        birthdayDisplay: `${birthDay}/${birthMonth}`
                    });
                }
            });
            return upcoming.sort((a,b) => a.daysLeft - b.daysLeft);
        };
        
        const App = () => {
            const [loggedIn, setLoggedIn] = useState(false);
            const [servantName, setServantName] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [activeTab, setActiveTab] = useState("dashboard");
            const [students, setStudents] = useState([]);
            const [servants, setServants] = useState([]);
            const [activities, setActivities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedClass, setSelectedClass] = useState(CLASSES[0]);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split("T")[0]);
            const [search, setSearch] = useState("");
            const [showAddStudent, setShowAddStudent] = useState(false);
            const [newStudent, setNewStudent] = useState({ name: "", phone: "", parentPhone: "", address: "", birthday: "" });
            const [selectedStudents, setSelectedStudents] = useState([]);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            
            useEffect(() => {
                if (!loggedIn || !db) return;
                setLoading(true);
                
                const unsubscribeStudents = db.collection("students").onSnapshot((snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setStudents(data);
                    setLoading(false);
                }, (err) => { console.error(err); setError("خطأ في الاتصال"); setLoading(false); });
                
                const unsubscribeServants = db.collection("servants").onSnapshot((snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setServants(data);
                });
                
                const unsubscribeActivities = db.collection("activities").orderBy("time", "desc").limit(100).onSnapshot((snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setActivities(data);
                });
                
                return () => { unsubscribeStudents(); unsubscribeServants(); unsubscribeActivities(); };
            }, [loggedIn]);
            
            const addActivity = async (action) => {
                try { await db.collection("activities").add({ servant: servantName, action, time: Date.now(), timeStr: new Date().toLocaleString('ar-EG') }); } catch(e) { console.error(e); }
            };
            
            const handleLogin = async () => {
                if (!servantName.trim()) { setError("الرجاء إدخال اسم الخادم"); return; }
                if (password !== MASTER_PASSWORD) { setError("كلمة المرور غير صحيحة"); return; }
                if (!db) { setError("قاعدة البيانات غير جاهزة"); return; }
                
                try {
                    const snapshot = await db.collection("servants").where("name", "==", servantName).get();
                    if (snapshot.empty) {
                        await db.collection("servants").add({ name: servantName, firstLogin: new Date().toLocaleString('ar-EG'), firstLoginTime: Date.now(), lastLogin: new Date().toLocaleString('ar-EG'), lastLoginTime: Date.now() });
                        await addActivity(`خادم جديد: ${servantName} دخل النظام`);
                    } else {
                        await db.collection("servants").doc(snapshot.docs[0].id).update({ lastLogin: new Date().toLocaleString('ar-EG'), lastLoginTime: Date.now() });
                        await addActivity(`${servantName} دخل إلى النظام`);
                    }
                    setLoggedIn(true);
                    setError("");
                } catch(e) {
                    console.error(e);
                    setError("خطأ: " + e.message);
                }
            };
            
            const handleLogout = async () => { await addActivity(`${servantName} خرج من النظام`); setLoggedIn(false); setServantName(""); setPassword(""); };
            
            const addStudent = async () => {
                if (!newStudent.name || !newStudent.phone) { alert("الاسم والتليفون مطلوبين"); return; }
                try {
                    await db.collection("students").add({ 
                        name: newStudent.name, 
                        phone: newStudent.phone, 
                        parentPhone: newStudent.parentPhone || "", 
                        address: newStudent.address || "", 
                        birthday: newStudent.birthday || "",
                        class: selectedClass, 
                        points: 0, 
                        attendance: {}, 
                        addedBy: servantName, 
                        addedDate: new Date().toLocaleString('ar-EG'), 
                        addedTime: Date.now() 
                    });
                    await addActivity(`أضاف ${servantName} مخدوم جديد: ${newStudent.name} - فصل ${selectedClass}`);
                    setNewStudent({ name: "", phone: "", parentPhone: "", address: "", birthday: "" });
                    setShowAddStudent(false);
                } catch(e) { alert("حدث خطأ: " + e.message); }
            };
            
            const updateStudentInfo = async () => {
                if (!editingStudent) return;
                if (!editingStudent.name || !editingStudent.phone) { alert("الاسم والتليفون مطلوبين"); return; }
                try {
                    await db.collection("students").doc(editingStudent.id).update({
                        name: editingStudent.name,
                        phone: editingStudent.phone,
                        parentPhone: editingStudent.parentPhone || "",
                        address: editingStudent.address || "",
                        birthday: editingStudent.birthday || ""
                    });
                    await addActivity(`${servantName} قام بتعديل بيانات المخدوم: ${editingStudent.name}`);
                    setShowEditModal(false);
                    setEditingStudent(null);
                } catch(e) { alert("حدث خطأ أثناء التعديل"); }
            };
            
            const updateAttendance = async (studentIds, status) => {
                try {
                    const batch = db.batch();
                    for (const studentId of studentIds) {
                        const student = students.find(s => s.id === studentId);
                        if (student) {
                            const updatedAttendance = { ...(student.attendance || {}), [selectedDate]: status };
                            batch.update(db.collection("students").doc(studentId), { attendance: updatedAttendance });
                        }
                    }
                    await batch.commit();
                    await addActivity(`${servantName} سجل حضور ${studentIds.length} مخدوم`);
                    setSelectedStudents([]);
                } catch(e) { alert("حدث خطأ"); }
            };
            
            const addPoints = async (studentId, studentName) => {
                try {
                    const student = students.find(s => s.id === studentId);
                    await db.collection("students").doc(studentId).update({ points: (student?.points || 0) + 5 });
                    await addActivity(`${servantName} أضاف 5 نقاط لـ ${studentName}`);
                } catch(e) { alert("حدث خطأ"); }
            };
            
            const deleteStudent = async (studentId, studentName) => {
                if (confirm(`هل تريد حذف ${studentName}؟`)) {
                    try { await db.collection("students").doc(studentId).delete(); await addActivity(`${servantName} حذف مخدوم: ${studentName}`); } catch(e) { alert("حدث خطأ"); }
                }
            };
            
            const getAttendanceRate = (student) => {
                const records = Object.values(student.attendance || {});
                if (records.length === 0) return 0;
                return Math.round((records.filter(r => r === true).length / records.length) * 100);
            };
            
            const filteredStudents = students.filter(s => s.class === selectedClass && s.name?.includes(search));
            const todayAttendance = filteredStudents.filter(s => s.attendance?.[selectedDate] === true).length;
            const totalPoints = filteredStudents.reduce((sum, s) => sum + (s.points || 0), 0);
            const upcomingBirthdaysList = getUpcomingBirthdays(students);
            
            if (!db) {
                return <div className="min-h-screen flex items-center justify-center"><div className="text-center text-red-600"><div className="text-4xl mb-4">⚠️</div><h2 className="text-xl">خطأ في اتصال قاعدة البيانات</h2><p className="text-sm">تأكد من إعدادات Firebase</p></div></div>;
            }
            
            if (loading && loggedIn) {
                return <div className="min-h-screen flex items-center justify-center"><div className="text-center"><div className="loading mx-auto mb-4"></div><p>جاري التحميل...</p></div></div>;
            }
            
            if (!loggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-600 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                            <div className="text-center mb-8"><div className="text-6xl mb-3">⛪</div><h1 className="text-2xl font-bold">نظام مدارس الأحد</h1><p className="text-gray-600">جمعيه مار بولس الرسول</p><p className="text-sm text-green-600 mt-2">✓ بيانات مشتركة لجميع الخدام</p></div>
                            {error && <div className="bg-red-100 text-red-700 p-3 rounded-xl mb-4 text-center">{error}</div>}
                            <div className="space-y-4">
                                <input type="text" className="w-full p-3 border rounded-xl" placeholder="اسم الخادم" value={servantName} onChange={e => setServantName(e.target.value)} />
                                <input type="password" className="w-full p-3 border rounded-xl" placeholder="كلمة المرور" value={password} onChange={e => setPassword(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleLogin()} />
                                <button onClick={handleLogin} className="w-full bg-indigo-600 text-white p-3 rounded-xl font-semibold hover:bg-indigo-700">دخول</button>
                            </div>
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="min-h-screen bg-gray-50" dir="rtl">
                    <div className="bg-white shadow-sm px-6 py-4 flex justify-between items-center flex-wrap gap-3">
                        <div><h1 className="text-xl font-bold text-indigo-600">نظام مدارس الأحد</h1><p className="text-sm text-gray-500">جمعية مار بولس - أعياد الميلاد والتواصل</p></div>
                        <div className="flex items-center gap-4"><div className="text-left"><p className="font-semibold">{servantName}</p><p className="text-xs text-gray-500">خادم</p></div><button onClick={handleLogout} className="bg-red-500 text-white px-4 py-2 rounded-lg">خروج</button></div>
                    </div>
                    <div className="border-b bg-white px-6 overflow-x-auto"><div className="flex gap-2">{[{id:"dashboard",label:"📊 الرئيسية"},{id:"students",label:"👥 المخدومين"},{id:"attendance",label:"📅 الحضور"},{id:"birthdays",label:"🎂 أعياد الميلاد"},{id:"reports",label:"📈 التقارير"},{id:"servants",label:"🙏 الخدام"}].map(tab=><button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`px-4 py-3 font-semibold whitespace-nowrap ${activeTab===tab.id?"border-b-2 border-indigo-600 text-indigo-600":"text-gray-500"}`}>{tab.label}</button>)}</div></div>
                    
                    <div className="p-6">
                        {/* لوحة التحكم dashboard */}
                        {activeTab === "dashboard" && (
                            <div>
                                <h2 className="text-2xl font-bold mb-4">لوحة التحكم</h2>
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                                    <div className="bg-blue-500 text-white p-6 rounded-xl"><div className="text-3xl">👥</div><div className="text-2xl font-bold">{filteredStudents.length}</div><div>المخدومين (هذا الفصل)</div></div>
                                    <div className="bg-green-500 text-white p-6 rounded-xl"><div className="text-3xl">✅</div><div className="text-2xl font-bold">{todayAttendance}</div><div>الحضور اليوم</div></div>
                                    <div className="bg-yellow-500 text-white p-6 rounded-xl"><div className="text-3xl">🏆</div><div className="text-2xl font-bold">{totalPoints}</div><div>إجمالي النقاط</div></div>
                                    <div className="bg-purple-500 text-white p-6 rounded-xl"><div className="text-3xl">🙏</div><div className="text-2xl font-bold">{servants.length}</div><div>الخدام</div></div>
                                    <div className="bg-pink-500 text-white p-6 rounded-xl"><div className="text-3xl">🎂</div><div className="text-2xl font-bold">{upcomingBirthdaysList.length}</div><div>أعياد ميلاد قادمة</div></div>
                                </div>
                                {upcomingBirthdaysList.length > 0 && (
                                    <div className="bg-white rounded-xl p-5 shadow">
                                        <h3 className="text-lg font-bold mb-3 flex items-center gap-2">🎉 أعياد ميلاد قادمة خلال 30 يوماً</h3>
                                        <div className="space-y-2">
                                            {upcomingBirthdaysList.map(s => (
                                                <div key={s.id} className="flex justify-between items-center p-2 border-b border-orange-100">
                                                    <div><span className="font-semibold">{s.name}</span> <span className="text-sm text-gray-500 mr-2">({s.class})</span></div>
                                                    <div className="birthday-badge">🎂 {s.birthdayDisplay} - بعد {s.daysLeft} يوم</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {/* إدارة المخدومين مع معلومات كاملة */}
                        {activeTab === "students" && (
                            <div>
                                <div className="flex justify-between mb-4 flex-wrap gap-2"><h2 className="text-2xl font-bold">المخدومين - بيانات كاملة</h2><button onClick={()=>setShowAddStudent(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-lg">➕ إضافة مخدوم</button></div>
                                <div className="bg-white rounded-xl p-6">
                                    <select className="border p-2 rounded-lg mb-4 w-full" value={selectedClass} onChange={e=>setSelectedClass(e.target.value)}>{CLASSES.map(c=><option key={c}>{c}</option>)}</select>
                                    <input type="text" placeholder="بحث بالاسم..." className="border p-2 rounded-lg w-full mb-4" value={search} onChange={e=>setSearch(e.target.value)}/>
                                    <div className="space-y-3">
                                        {filteredStudents.map(s=>(
                                            <div key={s.id} className="border rounded-xl p-4 card-hover transition-all bg-white">
                                                <div className="flex flex-wrap justify-between items-start gap-3">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 flex-wrap">
                                                            <span className="font-bold text-lg">{s.name}</span>
                                                            {s.birthday && <span className="birthday-badge text-xs">🎂 {formatBirthday(s.birthday)}</span>}
                                                        </div>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2 text-sm text-gray-600">
                                                            <div>📞 تليفون المخدوم: {s.phone || "—"}</div>
                                                            <div>👨‍👩 تليفون ولي الأمر: {s.parentPhone || "—"}</div>
                                                            <div>🏠 العنوان: {s.address || "—"}</div>
                                                            <div>⭐ النقاط: {s.points || 0}</div>
                                                            <div>📅 نسبة الحضور: {getAttendanceRate(s)}%</div>
                                                            {s.birthday && <div>🎂 تاريخ الميلاد: {s.birthday.split('-').reverse().join('/')}</div>}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { setEditingStudent({...s}); setShowEditModal(true); }} className="bg-blue-500 text-white px-3 py-1.5 rounded-lg text-sm">✏️ تعديل</button>
                                                        <button onClick={()=>addPoints(s.id,s.name)} className="bg-yellow-500 text-white px-3 py-1.5 rounded-lg text-sm">🏆 +5</button>
                                                        <button onClick={()=>deleteStudent(s.id,s.name)} className="bg-red-500 text-white px-3 py-1.5 rounded-lg text-sm">🗑️ حذف</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {filteredStudents.length === 0 && <div className="text-center text-gray-400 py-8">لا يوجد مخدومين في هذا الفصل</div>}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* attendance tab */}
                        {activeTab === "attendance" && (
                            <div><h2 className="text-2xl font-bold mb-4">تسجيل الحضور</h2>
                            <div className="bg-white rounded-xl p-6"><select className="border p-2 rounded-lg mb-4 w-full" value={selectedClass} onChange={e=>setSelectedClass(e.target.value)}>{CLASSES.map(c=><option key={c}>{c}</option>)}</select>
                            <input type="date" className="border p-2 rounded-lg mb-4 w-full" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)}/>
                            <div className="flex gap-2 mb-4"><button onClick={()=>setSelectedStudents(filteredStudents.map(s=>s.id))} className="bg-gray-700 text-white px-4 py-2 rounded-lg">تحديد الكل</button>
                            <button onClick={()=>updateAttendance(selectedStudents,true)} className="flex-1 bg-green-600 text-white py-2 rounded-lg">حاضر</button>
                            <button onClick={()=>updateAttendance(selectedStudents,false)} className="flex-1 bg-red-600 text-white py-2 rounded-lg">غائب</button></div>
                            {filteredStudents.map(s=><div key={s.id} onClick={()=>setSelectedStudents(prev=>prev.includes(s.id)?prev.filter(i=>i!==s.id):[...prev,s.id])} className={`p-3 border rounded-lg mb-2 cursor-pointer ${selectedStudents.includes(s.id)?"bg-indigo-50 border-indigo-500":"border-gray-200"}`}><span className="font-semibold">{s.name}</span> {s.attendance?.[selectedDate]!==undefined && <span className={`mr-2 text-sm ${s.attendance?.[selectedDate]?"text-green-600":"text-red-600"}`}>{s.attendance?.[selectedDate]?"✅ حاضر":"❌ غائب"}</span>}</div>)}</div></div>
                        )}
                        
                        {/* صفحة أعياد الميلاد المنفصلة */}
                        {activeTab === "birthdays" && (
                            <div>
                                <h2 className="text-2xl font-bold mb-2">🎂 أعياد الميلاد</h2>
                                <p className="text-gray-500 mb-4">جميع أعياد ميلاد المخدومين مرتبة حسب التاريخ (قادمة خلال 30 يومًا + جميع الأعياد)</p>
                                <div className="bg-white rounded-xl p-6">
                                    <div className="mb-6">
                                        <h3 className="text-lg font-semibold border-b pb-2 mb-3 text-orange-600">🌟 الأعياد القادمة (خلال 30 يوماً)</h3>
                                        {upcomingBirthdaysList.length === 0 && <div className="text-gray-400 p-4 text-center">لا توجد أعياد ميلاد قادمة خلال 30 يوماً</div>}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {upcomingBirthdaysList.map(s => (
                                                <div key={s.id} className="flex justify-between items-center p-3 bg-gradient-to-r from-orange-50 to-amber-50 rounded-xl border border-orange-200">
                                                    <div><span className="font-bold">{s.name}</span><span className="text-xs mr-2 text-gray-500">({s.class})</span><div className="text-sm text-gray-600">📞 {s.phone}</div></div>
                                                    <div className="text-center bg-white px-3 py-1 rounded-full shadow text-sm font-bold text-amber-700">بعد {s.daysLeft} يوم 🎂</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <h3 className="text-lg font-semibold border-b pb-2 mb-3 mt-6">📅 جميع أعياد الميلاد (حسب الشهر)</h3>
                                    {students.filter(s => s.birthday).length === 0 ? (
                                        <div className="text-gray-400 text-center p-6">لا توجد بيانات ميلاد مسجلة، قم بإضافة تاريخ ميلاد لكل مخدوم عبر زر تعديل</div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {[...students].filter(s => s.birthday).sort((a,b) => {
                                                const aParts = a.birthday.split('-');
                                                const bParts = b.birthday.split('-');
                                                if (aParts[1] === bParts[1]) return (aParts[2] || 0) - (bParts[2] || 0);
                                                return (aParts[1] || 0) - (bParts[1] || 0);
                                            }).map(s => {
                                                const parts = s.birthday.split('-');
                                                const monthName = new Date(2000, parseInt(parts[1])-1, 1).toLocaleString('ar-EG', { month: 'long' });
                                                return (
                                                    <div key={s.id} className="border rounded-xl p-3 flex justify-between items-center bg-white shadow-sm hover:shadow">
                                                        <div><div className="font-semibold">{s.name}</div><div className="text-xs text-gray-500">{s.class}</div><div className="text-sm">📞 {s.phone}</div></div>
                                                        <div className="text-center bg-indigo-50 px-3 py-1 rounded-full"><span className="font-bold text-indigo-700">{parts[2]}</span> <span className="text-xs">{monthName}</span></div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        
                        {activeTab === "reports" && (
                            <div><h2 className="text-2xl font-bold mb-4">التقارير</h2><div className="bg-white rounded-xl p-6"><select className="border p-2 rounded-lg w-full mb-4" value={selectedClass} onChange={e=>setSelectedClass(e.target.value)}>{CLASSES.map(c=><option key={c}>{c}</option>)}</select>{filteredStudents.map((s,i)=><div key={s.id} className="flex justify-between items-center p-3 border-b"><div><span className="font-bold">{i+1}.</span> {s.name}</div><div><span className="text-sm">نسبة الحضور: {getAttendanceRate(s)}% | نقاط: {s.points||0}</span></div></div>)}</div></div>
                        )}
                        
                        {activeTab === "servants" && (
                            <div><h2 className="text-2xl font-bold mb-4">الخدام</h2><div className="bg-white rounded-xl p-6">{servants.map(s=><div key={s.id} className="p-3 border-b"><div className="font-semibold">{s.name}</div><div className="text-sm text-gray-500">آخر دخول: {s.lastLogin || "غير متاح"}</div></div>)}</div></div>
                        )}
                    </div>
                    
                    {/* Modal إضافة مخدوم مع حقل الميلاد */}
                    {showAddStudent && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl p-6 w-full max-w-md"><h3 className="text-xl font-bold mb-4">إضافة مخدوم جديد</h3>
                                <input type="text" placeholder="الاسم الكامل *" className="w-full p-2 border rounded-lg mb-3" value={newStudent.name} onChange={e=>setNewStudent({...newStudent,name:e.target.value})}/>
                                <input type="tel" placeholder="تليفون المخدوم *" className="w-full p-2 border rounded-lg mb-3" value={newStudent.phone} onChange={e=>setNewStudent({...newStudent,phone:e.target.value})}/>
                                <input type="tel" placeholder="تليفون ولي الأمر" className="w-full p-2 border rounded-lg mb-3" value={newStudent.parentPhone} onChange={e=>setNewStudent({...newStudent,parentPhone:e.target.value})}/>
                                <input type="text" placeholder="العنوان" className="w-full p-2 border rounded-lg mb-3" value={newStudent.address} onChange={e=>setNewStudent({...newStudent,address:e.target.value})}/>
                                <label className="block text-sm font-medium text-gray-700 mb-1">تاريخ الميلاد (اختياري)</label>
                                <input type="date" className="w-full p-2 border rounded-lg mb-3" value={newStudent.birthday} onChange={e=>setNewStudent({...newStudent,birthday:e.target.value})}/>
                                <div className="flex gap-3"><button onClick={addStudent} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg">إضافة</button><button onClick={()=>setShowAddStudent(false)} className="flex-1 bg-gray-300 py-2 rounded-lg">إلغاء</button></div>
                            </div>
                        </div>
                    )}
                    
                    {/* Modal تعديل بيانات المخدوم */}
                    {showEditModal && editingStudent && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl p-6 w-full max-w-md"><h3 className="text-xl font-bold mb-4">تعديل بيانات المخدوم</h3>
                                <input type="text" placeholder="الاسم الكامل" className="w-full p-2 border rounded-lg mb-3" value={editingStudent.name} onChange={e=>setEditingStudent({...editingStudent,name:e.target.value})}/>
                                <input type="tel" placeholder="تليفون المخدوم" className="w-full p-2 border rounded-lg mb-3" value={editingStudent.phone} onChange={e=>setEditingStudent({...editingStudent,phone:e.target.value})}/>
                                <input type="tel" placeholder="تليفون ولي الأمر" className="w-full p-2 border rounded-lg mb-3" value={editingStudent.parentPhone || ""} onChange={e=>setEditingStudent({...editingStudent,parentPhone:e.target.value})}/>
                                <input type="text" placeholder="العنوان" className="w-full p-2 border rounded-lg mb-3" value={editingStudent.address || ""} onChange={e=>setEditingStudent({...editingStudent,address:e.target.value})}/>
                                <label className="block text-sm font-medium text-gray-700 mb-1">تاريخ الميلاد</label>
                                <input type="date" className="w-full p-2 border rounded-lg mb-3" value={editingStudent.birthday || ""} onChange={e=>setEditingStudent({...editingStudent,birthday:e.target.value})}/>
                                <div className="flex gap-3"><button onClick={updateStudentInfo} className="flex-1 bg-green-600 text-white py-2 rounded-lg">حفظ التعديلات</button><button onClick={()=>setShowEditModal(false)} className="flex-1 bg-gray-300 py-2 rounded-lg">إلغاء</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
